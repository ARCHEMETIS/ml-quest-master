[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ส่ง path /netlify/functions/* ไปยัง Netlify Functions endpoint จริง
# (frontend เรียก /netlify/functions/... ได้ตรง ๆ ตาม spec)
[[redirects]]
  from = "/netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# เสิร์ฟ web app manifest ด้วย MIME type ที่ถูกต้อง (ไม่งั้น browser อ่านไอคอน PWA ไม่ได้)
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
